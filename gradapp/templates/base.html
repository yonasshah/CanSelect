<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Candidate Selection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <!-- Navigation Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'applicant_list' %}">Candidate Selection</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link {% if request.resolver_match.url_name|default:'' == 'applicant_list' %}active{% endif %}" 
                 href="{% url 'applicant_list' %}">Applicants</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if 'dataset' in request.resolver_match.url_name|default:'' %}active{% endif %}" 
                 href="{% url 'dataset_list' %}">DataSets</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if 'batch' in request.resolver_match.url_name|default:'' %}active{% endif %}" 
                 href="{% url 'batch_list' %}">Batches</a>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto">
          {% if user.is_authenticated %}
            <li class="nav-item">
              <span class="navbar-text text-white me-3">👤 {{ user.username }}</span>
            </li>
            <li class="nav-item">
               <form method="post" action="{% url 'logout' %}" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
              </form>
            </li>
          {% else %}
            <li class="nav-item">
              <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Login</a>
            </li>
          {% endif %}
        </ul>
        </div>
      </div>
    </nav>

    <main class="container mt-4">
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
