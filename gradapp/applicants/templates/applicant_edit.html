{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Edit Applicant: {{ applicant.first_name }} {{ applicant.last_name }}</h2>
  <a class="btn btn-outline-secondary btn-sm" href="{% url 'applicant_detail' applicant.pk %}">Cancel</a>
</div>

<form method="post" class="row g-3">
  {% csrf_token %}
  {{ form.as_p }}
  <div class="col-12 mt-2">
    <button type="submit" class="btn btn-success">💾 Save Changes</button>
    <a href="{% url 'applicant_detail' applicant.pk %}" class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
