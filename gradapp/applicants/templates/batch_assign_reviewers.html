{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="mb-1">Assign Reviewers</h2>
            <h5 class="text-muted">Batch: {{ batch.DisplayName }}</h5>
        </div>
        <a href="{% url 'batch_list' %}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i> Back
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        {{ form.reviewers.label }}
                    </label>
                    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-2">
                        {% for checkbox in form.reviewers %}
                        <div class="form-check">
                            {{ checkbox.tag }}
                            <label class="form-check-label">{{ checkbox.choice_label }}</label>
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-1"></i> Save Assignments
                    </button>
                    <a href="{% url 'batch_list' %}" class="btn btn-outline-secondary">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
