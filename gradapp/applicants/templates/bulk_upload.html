{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Bulk Applicant Upload</h2>
    <p class="text-muted">Select a folder. Each subfolder will create a new applicant record.</p>
    
    <form method="post" enctype="multipart/form-data" class="card p-4 shadow-sm">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Start Bulk Processing</button>
            <a href="{% url 'applicant_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
