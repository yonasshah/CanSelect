{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Edit DataSet: {{ dataset.DisplayName }}</h2>
  <a class="btn btn-outline-secondary" href="{% url 'dataset_detail' dataset.pk %}">Cancel</a>
</div>

<form method="post" class="mt-3">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-success">Save Changes</button>
</form>
{% endblock %}
